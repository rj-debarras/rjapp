<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#96d11e" />
      <stop offset="100%" stop-color="#0a3d13" />
    </linearGradient>
    <linearGradient id="logoRingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b6e841" />
      <stop offset="100%" stop-color="#052e0a" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="url(#logoGrad)" stroke-width="7" />
  
  <!-- Inner ring accent -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#logoRingGrad)" stroke-width="1.5" />
  <circle cx="50" cy="50" r="48" fill="none" stroke="url(#logoRingGrad)" stroke-width="1" />

  <g fill="url(#logoGrad)" filter="url(#shadow)">
    <!-- T crossbar arched -->
    <path d="M 18 35 Q 50 10 82 35 L 76 41 Q 50 18 24 41 Z" />
    
    <!-- T stem -->
    <rect x="46" y="24" width="8" height="58" />
    
    <!-- J -->
    <path d="M 36 43 L 36 68 Q 36 82 18 76 L 18 68 Q 28 72 28 65 L 28 43 Z" />
    
    <!-- R -->
    <path d="M 64 43 L 78 43 Q 86 43 86 53 Q 86 60 78 61 L 86 82 L 76 82 L 69 61 L 64 61 Z M 72 43 L 72 55 L 76 55 Q 80 55 80 49 Q 80 43 76 43 Z" />
  </g>
</svg>
